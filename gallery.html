<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | Saipatri Homestay</title>
    <meta name="description" content="Photo gallery of Saipatri Homestay in Kalimpong." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>
    <header class="site-header">
      <nav class="site-nav solid" aria-label="Primary navigation">
        <a class="brand" href="index.html"><em>Saipatri</em> Homestay</a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu">
          <span class="sr-only">Toggle navigation</span>
          <span></span><span></span><span></span>
        </button>
        <ul id="nav-menu" class="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="index.html#rooms">Rooms</a></li>
          <li><a href="index.html#experiences">Experiences</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="index.html#contact">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main class="gallery-main section">
      <div class="container">
        <div class="section-heading">
          <p class="eyebrow">Moments from the Hills</p>
          <h1>Gallery</h1>
        </div>
        <section class="gallery-grid" aria-label="Homestay photo gallery">
          <figure class="gallery-item landscape"><img src="https://picsum.photos/seed/kalimpong-valley-view/1200/800" alt="Kalimpong valley view" loading="lazy"/></figure>
          <figure class="gallery-item portrait"><img src="https://picsum.photos/seed/kalimpong-morning-mist/800/1200" alt="Morning mist from window" loading="lazy"/></figure>
          <figure class="gallery-item landscape"><img src="https://picsum.photos/seed/kalimpong-breakfast/1200/800" alt="Traditional breakfast spread" loading="lazy"/></figure>
          <figure class="gallery-item portrait"><img src="https://picsum.photos/seed/kalimpong-garden-flowers/800/1200" alt="Homestay garden flowers" loading="lazy"/></figure>
          <figure class="gallery-item landscape"><img src="https://picsum.photos/seed/kalimpong-living-room/1200/800" alt="Homestay living room" loading="lazy"/></figure>
          <figure class="gallery-item portrait"><img src="https://picsum.photos/seed/kalimpong-hosts/800/1200" alt="Homestay hosts" loading="lazy"/></figure>
          <figure class="gallery-item landscape"><img src="https://picsum.photos/seed/kalimpong-hillroad/1200/800" alt="Hill road through fog" loading="lazy"/></figure>
          <figure class="gallery-item portrait"><img src="https://picsum.photos/seed/kalimpong-tea-balcony/800/1200" alt="Tea on balcony" loading="lazy"/></figure>
          <figure class="gallery-item landscape"><img src="https://picsum.photos/seed/kalimpong-room-detail/1200/800" alt="Room detail" loading="lazy"/></figure>
          <figure class="gallery-item portrait"><img src="https://picsum.photos/seed/kalimpong-town-lane/800/1200" alt="Town lane" loading="lazy"/></figure>
          <figure class="gallery-item landscape"><img src="https://picsum.photos/seed/kalimpong-sunrise-hills/1200/800" alt="Sunrise over hills" loading="lazy"/></figure>
          <figure class="gallery-item portrait"><img src="https://picsum.photos/seed/kalimpong-evening-lights/800/1200" alt="Evening lights in fog" loading="lazy"/></figure>
        </section>
      </div>
    </main>
    <div class="lightbox" id="lightbox" aria-hidden="true">
      <button class="lightbox-close" type="button" aria-label="Close gallery">&times;</button>
      <button class="lightbox-prev" type="button" aria-label="Previous image">&#10094;</button>
      <img id="lightbox-image" src="" alt="Expanded gallery image" />
      <button class="lightbox-next" type="button" aria-label="Next image">&#10095;</button>
    </div>
    <footer class="site-footer">
      <div class="footer-top container">
        <p class="footer-brand">Saipatri Homestay</p>
        <ul class="footer-links">
          <li><a href="index.html">Home</a></li><li><a href="index.html#rooms">Rooms</a></li>
          <li><a href="index.html#experiences">Experiences</a></li><li><a href="gallery.html">Gallery</a></li>
          <li><a href="about.html">About</a></li><li><a href="index.html#contact">Contact</a></li>
        </ul>
        <div class="social-links">
          <a href="#" aria-label="Instagram">Instagram</a>
          <a href="#" aria-label="Facebook">Facebook</a>
        </div>
      </div>
      <div class="footer-bottom container">
        <p>&copy; 2026 Saipatri Homestay, Kalimpong. All rights reserved.</p>
      </div>
    </footer>
    <script src="main.js"></script>
  </body>
</html>
